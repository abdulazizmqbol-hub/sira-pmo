<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محلّل كراسات الشروط الفنية | AI Spec Analyzer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --navy-900: #0a1f3d;
      --navy-800: #102a4c;
      --navy-700: #18386a;
      --navy-600: #1f4685;
      --gold-500: #c9a24c;
      --gold-400: #d6b25e;
      --gold-300: #e3c277;
      --bg: #061429;
      --card: #0e2444;
      --muted: #94a3b8;
      --line: rgba(201, 162, 76, 0.18);
    }
    * { font-family: 'Tajawal', sans-serif; }
    html, body { background: var(--bg); color: #e6eefb; }
    body {
      background:
        radial-gradient(1200px 600px at 90% -10%, rgba(201,162,76,0.08), transparent 60%),
        radial-gradient(900px 500px at -10% 100%, rgba(31,70,133,0.35), transparent 60%),
        var(--bg);
      min-height: 100vh;
    }
    .glass {
      background: linear-gradient(180deg, rgba(16,42,76,0.85), rgba(10,31,61,0.85));
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .gold { color: var(--gold-400); }
    .btn-gold {
      background: linear-gradient(180deg, var(--gold-400), var(--gold-500));
      color: #0a1f3d;
      font-weight: 700;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow: 0 6px 18px rgba(201,162,76,0.25);
    }
    .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(201,162,76,0.35); }
    .btn-gold:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-ghost {
      border: 1px solid var(--line);
      color: #e6eefb;
      background: transparent;
    }
    .btn-ghost:hover { background: rgba(201,162,76,0.08); }
    .input, .textarea, .select {
      background: rgba(6,20,41,0.7);
      border: 1px solid var(--line);
      color: #e6eefb;
      border-radius: 12px;
      padding: 12px 14px;
      width: 100%;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .input:focus, .textarea:focus, .select:focus {
      outline: none;
      border-color: var(--gold-400);
      box-shadow: 0 0 0 3px rgba(201,162,76,0.18);
    }
    .label { color: #cdd9ee; font-weight: 500; margin-bottom: 6px; display: block; }
    .step-dot {
      width: 36px; height: 36px; border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--line); color: #cdd9ee; font-weight: 700;
      background: rgba(6,20,41,0.6);
    }
    .step-dot.active { border-color: var(--gold-400); color: var(--gold-400); box-shadow: 0 0 0 4px rgba(201,162,76,0.12); }
    .step-dot.done { background: var(--gold-400); color: #0a1f3d; border-color: var(--gold-400); }
    .step-bar { height: 2px; flex: 1; background: var(--line); position: relative; }
    .step-bar.done::after {
      content: ""; position: absolute; inset: 0; background: var(--gold-400);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px; font-size: 12px;
      border: 1px solid var(--line); color: #cdd9ee;
    }
    .verdict-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 999px; font-weight: 700; font-size: 16px;
    }
    .verdict-good { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.35); }
    .verdict-bad { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.35); }
    .verdict-warn { background: rgba(234,179,8,0.12); color: #facc15; border: 1px solid rgba(234,179,8,0.35); }
    .progress-track { background: rgba(255,255,255,0.06); height: 10px; border-radius: 999px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold-500), var(--gold-300));
      transition: width .8s ease;
    }
    .dropzone {
      border: 2px dashed var(--line);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      transition: all .15s ease;
      background: rgba(6,20,41,0.4);
    }
    .dropzone:hover, .dropzone.drag {
      border-color: var(--gold-400);
      background: rgba(201,162,76,0.06);
    }
    .scroll-soft::-webkit-scrollbar { width: 8px; }
    .scroll-soft::-webkit-scrollbar-thumb { background: rgba(201,162,76,0.25); border-radius: 8px; }
    .spinner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--gold-400);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse-glow {
      animation: pulseGlow 2s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,162,76,0.35); }
      50% { box-shadow: 0 0 0 12px rgba(201,162,76,0); }
    }
    .li-dot::before {
      content: "•"; color: var(--gold-400); margin-left: 8px; font-weight: 900;
    }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useRef, useEffect } = React;

    const MODEL_ID = "claude-sonnet-4-20250514";
    const API_URL = "https://api.anthropic.com/v1/messages";
    const STORAGE_KEY = "spec_analyzer_api_key";

    // ---------- Utilities ----------
    const fileToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        const base64 = String(result).split(",")[1] || "";
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const formatBytes = (bytes) => {
      if (!bytes) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let i = 0; let n = bytes;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(1)} ${units[i]}`;
    };

    const safeJsonExtract = (text) => {
      if (!text) return null;
      try { return JSON.parse(text); } catch (_) {}
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) return null;
      try { return JSON.parse(match[0]); } catch (_) { return null; }
    };

    // ---------- Prompts ----------
    const buildSystemPrompt = () => `أنت خبير استشاري في تحليل كراسات الشروط الفنية للمشاريع ومطابقتها مع قدرات الشركات وأهدافها الاستراتيجية. مهمتك تقديم تحليل دقيق ومحايد ومنظّم باللغة العربية.

تعليمات صارمة:
1. اقرأ كراسة الشروط المرفقة بعناية واستخرج: نطاق العمل، القيمة المالية، المدة الزمنية، أهم المتطلبات الفنية والإدارية، شروط التأهيل.
2. قارن بين متطلبات الكراسة وملف الشركة المعطى.
3. احكم بحيادية: "مناسب" / "مناسب بشروط" / "غير مناسب" مع نسبة توافق رقمية من 0 إلى 100.
4. أعطِ نقاط قوة ونقاط ضعف واقعية ومحددة (وليست عامة).
5. اكتب توصية نهائية تفصيلية وعملية.
6. أعِد الإجابة فقط بصيغة JSON صالح بدون أي نص قبله أو بعده، وبدون markdown أو تعليقات.

صيغة JSON المطلوبة بالضبط:
{
  "verdict": "مناسب" | "مناسب بشروط" | "غير مناسب",
  "compatibility_score": <رقم بين 0 و 100>,
  "summary": {
    "scope": "<نص قصير لنطاق المشروع>",
    "value": "<القيمة المالية أو 'غير محدد'>",
    "duration": "<المدة الزمنية أو 'غير محدد'>",
    "key_requirements": ["<متطلب>", "<متطلب>", ...]
  },
  "strengths": ["<سبب يجعل المشروع مناسبًا للشركة>", ...],
  "weaknesses": ["<سبب أو مخاطرة قد تجعله غير مناسب>", ...],
  "recommendation": "<توصية نهائية تفصيلية>"
}`;

    const buildUserText = (company) => `## ملف الشركة
- الاسم: ${company.name || "غير محدد"}
- القطاع / التخصص: ${company.sector || "غير محدد"}
- حجم الشركة: ${company.size || "غير محدد"}
- الخبرات والكفاءات الرئيسية: ${company.capabilities || "غير محدد"}
- الأهداف الاستراتيجية: ${company.goals || "غير محدد"}
- الميزانية التقديرية المتاحة: ${company.budget || "غير محدد"}
- القيود / المتطلبات الخاصة: ${company.constraints || "لا يوجد"}

حلّل كراسة الشروط المرفقة وفق التعليمات، وأعد JSON فقط.`;

    // ---------- API Call ----------
    async function analyzeSpec({ apiKey, company, pdfBase64, pdfName, rawText }) {
      const userContent = [];
      if (pdfBase64) {
        userContent.push({
          type: "document",
          source: { type: "base64", media_type: "application/pdf", data: pdfBase64 },
        });
      }
      if (rawText && rawText.trim()) {
        userContent.push({
          type: "text",
          text: `### نص كراسة الشروط (${pdfName ? "إضافي" : "ملصق"}):\n\n${rawText.trim()}`,
        });
      }
      userContent.push({ type: "text", text: buildUserText(company) });

      const body = {
        model: MODEL_ID,
        max_tokens: 4096,
        system: buildSystemPrompt(),
        messages: [{ role: "user", content: userContent }],
      };

      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        let detail = "";
        try {
          const j = await res.json();
          detail = j?.error?.message || JSON.stringify(j);
        } catch (_) {
          detail = await res.text();
        }
        throw new Error(`فشل الاتصال بـ Anthropic API (${res.status}): ${detail}`);
      }

      const data = await res.json();
      const text = (data?.content || [])
        .filter((b) => b.type === "text")
        .map((b) => b.text)
        .join("\n");
      const parsed = safeJsonExtract(text);
      if (!parsed) throw new Error("تعذّر قراءة استجابة النموذج كـ JSON. حاول مرة أخرى.");
      return parsed;
    }

    // ---------- UI Components ----------
    function Stepper({ step }) {
      const steps = ["ملف الشركة", "كراسة الشروط", "التقرير التحليلي"];
      return (
        <div className="flex items-center gap-3 w-full">
          {steps.map((label, i) => {
            const idx = i + 1;
            const state = step > idx ? "done" : step === idx ? "active" : "idle";
            return (
              <React.Fragment key={label}>
                <div className="flex items-center gap-3 min-w-fit">
                  <div className={`step-dot ${state === "active" ? "active" : ""} ${state === "done" ? "done" : ""}`}>
                    {state === "done" ? "✓" : idx}
                  </div>
                  <div className="hidden md:block text-sm">
                    <div className="text-xs text-slate-400">الخطوة {idx}</div>
                    <div className={`font-bold ${state !== "idle" ? "gold" : "text-slate-300"}`}>{label}</div>
                  </div>
                </div>
                {idx < steps.length && <div className={`step-bar ${step > idx ? "done" : ""}`} />}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    function ApiKeyBar({ apiKey, setApiKey }) {
      const [show, setShow] = useState(false);
      const [tmp, setTmp] = useState(apiKey || "");
      useEffect(() => setTmp(apiKey || ""), [apiKey]);
      const save = () => {
        setApiKey(tmp.trim());
        try { localStorage.setItem(STORAGE_KEY, tmp.trim()); } catch (_) {}
      };
      const clear = () => {
        setApiKey("");
        setTmp("");
        try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
      };
      return (
        <details className="glass rounded-2xl p-4">
          <summary className="flex items-center justify-between gap-3">
            <div className="flex items-center gap-3">
              <span className="text-xl">🔑</span>
              <div>
                <div className="font-bold">مفتاح Anthropic API</div>
                <div className="text-xs text-slate-400">
                  {apiKey ? "تم حفظ المفتاح محليًا في متصفحك." : "لم يتم إدخال مفتاح بعد."}
                </div>
              </div>
            </div>
            <span className="badge">{apiKey ? "مُهيّأ ✓" : "مطلوب"}</span>
          </summary>
          <div className="mt-4 grid md:grid-cols-[1fr_auto_auto] gap-2">
            <input
              className="input"
              type={show ? "text" : "password"}
              placeholder="sk-ant-..."
              value={tmp}
              onChange={(e) => setTmp(e.target.value)}
              dir="ltr"
            />
            <button className="btn-ghost rounded-xl px-4 py-2" onClick={() => setShow((s) => !s)}>
              {show ? "إخفاء" : "إظهار"}
            </button>
            <div className="flex gap-2">
              <button className="btn-gold rounded-xl px-4 py-2" onClick={save}>حفظ</button>
              {apiKey && <button className="btn-ghost rounded-xl px-3 py-2" onClick={clear}>مسح</button>}
            </div>
          </div>
          <p className="mt-3 text-xs text-slate-400 leading-relaxed">
            يُحفظ المفتاح في متصفحك فقط (localStorage) ولا يُرسل لأي خادم آخر غير Anthropic.
            هذا التطبيق يستدعي API مباشرة من المتصفح، لذلك يُنصح باستخدام مفتاح بصلاحيات محدودة.
          </p>
        </details>
      );
    }

    function CompanyForm({ company, setCompany, onNext }) {
      const update = (k, v) => setCompany((c) => ({ ...c, [k]: v }));
      const valid =
        company.name.trim() &&
        company.sector.trim() &&
        company.size.trim() &&
        company.capabilities.trim() &&
        company.goals.trim();

      return (
        <div className="glass rounded-2xl p-6 md:p-8">
          <h2 className="text-2xl font-bold mb-1">ملف الشركة</h2>
          <p className="text-slate-400 mb-6">أدخل بيانات شركتك حتى يتمكن الذكاء الاصطناعي من تقييم مدى مناسبة المشروع.</p>

          <div className="grid md:grid-cols-2 gap-4">
            <div>
              <label className="label">اسم الشركة *</label>
              <input className="input" value={company.name} onChange={(e) => update("name", e.target.value)} placeholder="مثال: شركة سيرا للاستشارات" />
            </div>
            <div>
              <label className="label">القطاع / التخصص *</label>
              <input className="input" value={company.sector} onChange={(e) => update("sector", e.target.value)} placeholder="مثال: تقنية المعلومات، المقاولات، الاستشارات الإدارية..." />
            </div>
            <div>
              <label className="label">حجم الشركة *</label>
              <select className="select" value={company.size} onChange={(e) => update("size", e.target.value)}>
                <option value="">اختر...</option>
                <option value="صغيرة">صغيرة (أقل من 50 موظف)</option>
                <option value="متوسطة">متوسطة (50 - 250 موظف)</option>
                <option value="كبيرة">كبيرة (أكثر من 250 موظف)</option>
              </select>
            </div>
            <div>
              <label className="label">الميزانية التقديرية المتاحة</label>
              <input className="input" value={company.budget} onChange={(e) => update("budget", e.target.value)} placeholder="مثال: 1 - 10 مليون ريال" />
            </div>
            <div className="md:col-span-2">
              <label className="label">الخبرات والكفاءات الرئيسية *</label>
              <textarea className="textarea" rows="3" value={company.capabilities} onChange={(e) => update("capabilities", e.target.value)}
                placeholder="مثال: تطوير أنظمة ERP، تنفيذ مشاريع تحول رقمي، استشارات حوكمة، خبرة في المشاريع الحكومية..." />
            </div>
            <div className="md:col-span-2">
              <label className="label">الأهداف الاستراتيجية *</label>
              <textarea className="textarea" rows="3" value={company.goals} onChange={(e) => update("goals", e.target.value)}
                placeholder="مثال: التوسع في القطاع الحكومي، بناء محفظة أعمال، تحقيق ربحية لا تقل عن 20%..." />
            </div>
            <div className="md:col-span-2">
              <label className="label">القيود أو المتطلبات الخاصة</label>
              <textarea className="textarea" rows="3" value={company.constraints} onChange={(e) => update("constraints", e.target.value)}
                placeholder="مثال: لا نقبل مشاريع خارج الرياض، الحد الأدنى لقيمة المشروع 1 مليون ريال، لا نعمل في قطاع التعدين..." />
            </div>
          </div>

          <div className="mt-7 flex items-center justify-between">
            <p className="text-xs text-slate-400">* الحقول الإلزامية</p>
            <button className="btn-gold rounded-xl px-6 py-3" disabled={!valid} onClick={onNext}>
              التالي: رفع الكراسة ←
            </button>
          </div>
        </div>
      );
    }

    function UploadStep({ pdf, setPdf, rawText, setRawText, onBack, onAnalyze, canAnalyze, loading }) {
      const inputRef = useRef(null);
      const [drag, setDrag] = useState(false);
      const [err, setErr] = useState("");

      const handleFile = async (file) => {
        setErr("");
        if (!file) return;
        if (file.type !== "application/pdf") {
          setErr("يرجى رفع ملف PDF فقط.");
          return;
        }
        if (file.size > 30 * 1024 * 1024) {
          setErr("حجم الملف كبير جدًا (الحد الأقصى 30 ميجابايت).");
          return;
        }
        try {
          const base64 = await fileToBase64(file);
          setPdf({ name: file.name, size: file.size, base64 });
        } catch (e) {
          setErr("فشل قراءة الملف، حاول مرة أخرى.");
        }
      };

      const onDrop = (e) => {
        e.preventDefault(); setDrag(false);
        const file = e.dataTransfer.files?.[0];
        if (file) handleFile(file);
      };

      return (
        <div className="glass rounded-2xl p-6 md:p-8">
          <h2 className="text-2xl font-bold mb-1">كراسة الشروط</h2>
          <p className="text-slate-400 mb-6">ارفع الكراسة بصيغة PDF أو الصق نصها مباشرة، أو الاثنين معًا للحصول على دقة أعلى.</p>

          <div className="grid lg:grid-cols-2 gap-5">
            <div>
              <label className="label">رفع ملف PDF</label>
              <div
                className={`dropzone ${drag ? "drag" : ""}`}
                onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
                onDragLeave={() => setDrag(false)}
                onDrop={onDrop}
                onClick={() => inputRef.current?.click()}
              >
                <input
                  ref={inputRef}
                  type="file"
                  accept="application/pdf"
                  className="hidden"
                  onChange={(e) => handleFile(e.target.files?.[0])}
                />
                {pdf ? (
                  <div className="flex flex-col items-center gap-2">
                    <div className="text-4xl">📄</div>
                    <div className="font-bold gold">{pdf.name}</div>
                    <div className="text-sm text-slate-400">{formatBytes(pdf.size)}</div>
                    <button
                      className="btn-ghost rounded-xl px-4 py-2 mt-2 text-sm"
                      onClick={(e) => { e.stopPropagation(); setPdf(null); }}
                    >
                      إزالة الملف
                    </button>
                  </div>
                ) : (
                  <div className="flex flex-col items-center gap-2 py-4">
                    <div className="text-5xl">📤</div>
                    <div className="font-bold">اسحب الملف هنا أو اضغط للاختيار</div>
                    <div className="text-xs text-slate-400">PDF فقط • حتى 30 ميجابايت</div>
                  </div>
                )}
              </div>
              {err && <p className="text-red-400 text-sm mt-2">{err}</p>}
            </div>

            <div>
              <label className="label">أو الصق نص الكراسة</label>
              <textarea
                className="textarea scroll-soft"
                rows="12"
                value={rawText}
                onChange={(e) => setRawText(e.target.value)}
                placeholder="الصق هنا نص كراسة الشروط (نطاق العمل، المتطلبات، الشروط، إلخ)..."
              />
              <p className="text-xs text-slate-400 mt-2">
                يمكنك الاكتفاء بأحد الخيارين أو الجمع بينهما.
              </p>
            </div>
          </div>

          {(pdf || rawText.trim()) && (
            <div className="mt-5 glass rounded-xl p-4">
              <div className="flex items-center gap-2 mb-2">
                <span className="badge">معاينة سريعة</span>
              </div>
              <div className="text-sm text-slate-300 leading-relaxed max-h-40 overflow-auto scroll-soft">
                {pdf && <div className="mb-2">📄 ملف PDF: <span className="gold">{pdf.name}</span> ({formatBytes(pdf.size)})</div>}
                {rawText.trim() && <pre className="whitespace-pre-wrap font-sans text-slate-300">{rawText.trim().slice(0, 800)}{rawText.length > 800 ? "..." : ""}</pre>}
              </div>
            </div>
          )}

          <div className="mt-7 flex items-center justify-between gap-3 flex-wrap">
            <button className="btn-ghost rounded-xl px-6 py-3" onClick={onBack} disabled={loading}>→ رجوع</button>
            <button
              className={`btn-gold rounded-xl px-6 py-3 ${loading ? "pulse-glow" : ""}`}
              disabled={!canAnalyze || loading}
              onClick={onAnalyze}
            >
              {loading ? (
                <span className="flex items-center gap-2"><span className="spinner"></span> جاري تحليل الكراسة...</span>
              ) : ("ابدأ التحليل بالذكاء الاصطناعي ←")}
            </button>
          </div>
        </div>
      );
    }

    function VerdictPill({ verdict }) {
      const v = (verdict || "").trim();
      if (v.includes("غير")) return <span className="verdict-pill verdict-bad">❌ {v || "غير مناسب"}</span>;
      if (v.includes("بشروط")) return <span className="verdict-pill verdict-warn">⚠️ {v}</span>;
      return <span className="verdict-pill verdict-good">✅ {v || "مناسب"}</span>;
    }

    function Report({ report, company, onReset }) {
      const score = Math.max(0, Math.min(100, Number(report?.compatibility_score) || 0));
      const summary = report?.summary || {};
      const reqs = Array.isArray(summary.key_requirements) ? summary.key_requirements : [];
      const strengths = Array.isArray(report?.strengths) ? report.strengths : [];
      const weaknesses = Array.isArray(report?.weaknesses) ? report.weaknesses : [];

      return (
        <div className="space-y-5">
          <div className="glass rounded-2xl p-6 md:p-8">
            <div className="flex flex-wrap items-start justify-between gap-4">
              <div>
                <div className="text-slate-400 text-sm mb-1">التقرير التحليلي للمشروع</div>
                <h2 className="text-2xl font-bold">تقييم مدى مناسبة المشروع لـ <span className="gold">{company.name}</span></h2>
              </div>
              <VerdictPill verdict={report?.verdict} />
            </div>

            <div className="mt-6">
              <div className="flex items-center justify-between mb-2">
                <div className="font-bold">نسبة التوافق مع أهداف الشركة</div>
                <div className="gold font-black text-xl">{score}%</div>
              </div>
              <div className="progress-track"><div className="progress-fill" style={{ width: `${score}%` }} /></div>
            </div>
          </div>

          <div className="glass rounded-2xl p-6 md:p-8">
            <h3 className="text-lg font-bold mb-4 gold">ملخص الكراسة</h3>
            <div className="grid md:grid-cols-3 gap-4 mb-4">
              <SummaryBox label="نطاق العمل" value={summary.scope} />
              <SummaryBox label="القيمة المالية" value={summary.value} />
              <SummaryBox label="المدة الزمنية" value={summary.duration} />
            </div>
            {reqs.length > 0 && (
              <div>
                <div className="font-bold mb-2">المتطلبات الرئيسية</div>
                <ul className="grid md:grid-cols-2 gap-2 text-sm text-slate-200">
                  {reqs.map((r, i) => <li key={i} className="li-dot">{r}</li>)}
                </ul>
              </div>
            )}
          </div>

          <div className="grid md:grid-cols-2 gap-5">
            <div className="glass rounded-2xl p-6">
              <h3 className="text-lg font-bold mb-3 text-emerald-400">✅ نقاط القوة</h3>
              {strengths.length === 0 ? (
                <p className="text-slate-400 text-sm">لم يتم تحديد نقاط قوة.</p>
              ) : (
                <ul className="space-y-2 text-sm leading-relaxed">
                  {strengths.map((s, i) => <li key={i} className="li-dot">{s}</li>)}
                </ul>
              )}
            </div>
            <div className="glass rounded-2xl p-6">
              <h3 className="text-lg font-bold mb-3 text-rose-400">⚠️ نقاط الضعف والمخاطر</h3>
              {weaknesses.length === 0 ? (
                <p className="text-slate-400 text-sm">لم يتم تحديد نقاط ضعف.</p>
              ) : (
                <ul className="space-y-2 text-sm leading-relaxed">
                  {weaknesses.map((s, i) => <li key={i} className="li-dot">{s}</li>)}
                </ul>
              )}
            </div>
          </div>

          <div className="glass rounded-2xl p-6 md:p-8">
            <h3 className="text-lg font-bold mb-3 gold">التوصية النهائية</h3>
            <p className="leading-loose text-slate-100">{report?.recommendation || "لا توجد توصية."}</p>
          </div>

          <div className="flex justify-center pt-2">
            <button className="btn-gold rounded-xl px-8 py-3" onClick={onReset}>↻ تحليل كراسة جديدة</button>
          </div>
        </div>
      );
    }

    function SummaryBox({ label, value }) {
      return (
        <div className="rounded-xl border border-[var(--line)] p-4 bg-[rgba(6,20,41,0.5)]">
          <div className="text-xs text-slate-400 mb-1">{label}</div>
          <div className="font-bold text-slate-100">{value || "غير محدد"}</div>
        </div>
      );
    }

    // ---------- App ----------
    function App() {
      const [step, setStep] = useState(1);
      const [apiKey, setApiKey] = useState(() => {
        try { return localStorage.getItem(STORAGE_KEY) || ""; } catch (_) { return ""; }
      });

      const [company, setCompany] = useState({
        name: "", sector: "", size: "", capabilities: "",
        goals: "", budget: "", constraints: "",
      });

      const [pdf, setPdf] = useState(null); // { name, size, base64 }
      const [rawText, setRawText] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [report, setReport] = useState(null);

      const canAnalyze = useMemo(() => !!(pdf || rawText.trim()), [pdf, rawText]);

      const goAnalyze = async () => {
        setError("");
        if (!apiKey) { setError("يرجى إدخال مفتاح Anthropic API أولًا."); return; }
        if (!canAnalyze) { setError("يرجى رفع PDF أو لصق نص الكراسة."); return; }

        setLoading(true);
        try {
          const result = await analyzeSpec({
            apiKey, company,
            pdfBase64: pdf?.base64 || null,
            pdfName: pdf?.name || "",
            rawText,
          });
          setReport(result);
          setStep(3);
        } catch (e) {
          setError(e.message || "حدث خطأ غير متوقع.");
        } finally {
          setLoading(false);
        }
      };

      const reset = () => {
        setStep(1);
        setPdf(null); setRawText(""); setReport(null); setError("");
      };

      return (
        <div className="max-w-6xl mx-auto px-4 md:px-6 py-8">
          <header className="flex items-center justify-between mb-8 flex-wrap gap-4">
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 rounded-xl flex items-center justify-center text-2xl"
                   style={{ background: "linear-gradient(180deg, var(--gold-400), var(--gold-500))", color: "#0a1f3d" }}>
                ◈
              </div>
              <div>
                <h1 className="text-xl md:text-2xl font-black">محلّل كراسات الشروط الفنية</h1>
                <p className="text-xs text-slate-400">مدعوم بـ Anthropic Claude • {MODEL_ID}</p>
              </div>
            </div>
            <div className="badge">⚡ تحليل ذكي • تقرير فوري</div>
          </header>

          <div className="mb-6"><Stepper step={step} /></div>

          <div className="mb-5"><ApiKeyBar apiKey={apiKey} setApiKey={setApiKey} /></div>

          {error && (
            <div className="glass rounded-xl p-4 mb-5 border border-rose-500/40 bg-rose-500/5">
              <div className="text-rose-300 font-bold mb-1">حدث خطأ</div>
              <div className="text-sm text-rose-200/90">{error}</div>
            </div>
          )}

          {step === 1 && (
            <CompanyForm
              company={company}
              setCompany={setCompany}
              onNext={() => setStep(2)}
            />
          )}

          {step === 2 && (
            <UploadStep
              pdf={pdf} setPdf={setPdf}
              rawText={rawText} setRawText={setRawText}
              onBack={() => setStep(1)}
              onAnalyze={goAnalyze}
              canAnalyze={canAnalyze}
              loading={loading}
            />
          )}

          {step === 3 && report && (
            <Report report={report} company={company} onReset={reset} />
          )}

          <footer className="text-center text-xs text-slate-500 mt-10 pb-4">
            © {new Date().getFullYear()} Spec Analyzer • صُنع بعناية للمحترفين
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
